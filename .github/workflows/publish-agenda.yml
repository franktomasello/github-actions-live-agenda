name: Publish live agenda

on:
  workflow_dispatch:
  schedule:
    - cron: '7,22,37,52 * * * *'

concurrency:
  group: live-agenda-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip icalendar

      - name: Build agenda site
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
          AGENDA_TITLE: ${{ vars.AGENDA_TITLE || 'Live Agenda' }}
          AGENDA_TIMEZONE: ${{ vars.AGENDA_TIMEZONE || 'America/Los_Angeles' }}
          WINDOW_HOURS: ${{ vars.WINDOW_HOURS || '48' }}
          MAX_EVENTS: ${{ vars.MAX_EVENTS || '40' }}
        run: python scripts/generate_agenda.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
